name: Build FPC Trunk

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check for new commits
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      fpc_version: ${{ steps.check.outputs.fpc_version }}
      fpc_revision: ${{ steps.check.outputs.fpc_revision }}
      fpc_commit: ${{ steps.check.outputs.fpc_commit }}
      fpc_commit_title: ${{ steps.check.outputs.fpc_commit_title }}
    steps:
      - name: Check FPC trunk for changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://gitlab.com/freepascal.org/fpc/source.git fpc-src

          fpc_revision=$(git -C fpc-src describe)
          last_revision=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName \
            --jq '.[0].tagName' 2>/dev/null | sed 's/^v//' || true)

          changed=true
          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${fpc_revision}" == "${last_revision}" ]]; then
            changed=false
          fi

          if [[ "${changed}" == "false" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "fpc_revision=${fpc_revision}" >> "$GITHUB_OUTPUT"
            fpc_version=$(grep -m1 'PACKAGE_VERSION' fpc-src/Makefile | sed 's/.*PACKAGE_VERSION=//')
            echo "fpc_version=${fpc_version}" >> "$GITHUB_OUTPUT"
            echo "fpc_commit=$(git -C fpc-src log -1 --format=%H)" >> "$GITHUB_OUTPUT"
            echo "fpc_commit_title=$(git -C fpc-src log -1 --format=%s)" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build FPC (${{ matrix.cpu }})
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - cpu: aarch64
            runner: macos-latest
          - cpu: x86_64
            runner: macos-15-intel
    steps:
      - name: Install bootstrap compiler
        run: |
          curl -L -o bootstrap.dmg \
            https://downloads.freepascal.org/fpc/dist/3.2.2/i386-macosx/fpc-3.2.2.intelarm64-macosx.dmg
          hdiutil attach bootstrap.dmg -mountpoint /Volumes/fpc-bootstrap
          sudo installer -pkg "/Volumes/fpc-bootstrap/fpc-3.2.2-intelarm64-macosx.mpkg" -target /
          hdiutil detach /Volumes/fpc-bootstrap

      - name: Clone FPC source
        run: |
          git clone https://gitlab.com/freepascal.org/fpc/source.git fpc-src

      - name: Build FPC
        run: |
          sdk="$(xcrun --show-sdk-path)"
          cd fpc-src/compiler
          make revision.inc
          cd ..
          opt="-Fl${sdk}/usr/lib -XR${sdk} -WM11.0 -Sg -vw-n-h-l-d-u-t-p-c- -dREVINC"
          if [[ "${{ matrix.cpu }}" == "aarch64" ]]; then
            make build PP=/usr/local/bin/ppca64 OPT="${opt}"
            make install PP=/usr/local/bin/ppca64 OPT="${opt}" PREFIX="${{ runner.temp }}/fpc-install/usr/local"
          else
            make build PP=/usr/local/bin/ppcx64 OPT="${opt}"
            make install PP=/usr/local/bin/ppcx64 OPT="${opt}" PREFIX="${{ runner.temp }}/fpc-install/usr/local"
          fi

      - name: Test compiler
        run: |
          sdk="$(xcrun --show-sdk-path)"
          cat > /tmp/hello.pas << 'EOF'
          program Hello;
          uses SysUtils;
          begin
            writeln(Format('Hello FPC %s', [{$I %FPCVERSION%}]))
          end.
          EOF
          if [[ "${{ matrix.cpu }}" == "aarch64" ]]; then
            /usr/local/bin/ppca64 /tmp/hello.pas -o/tmp/hello -XR"${sdk}"
          else
            /usr/local/bin/ppcx64 /tmp/hello.pas -o/tmp/hello -XR"${sdk}"
          fi
          /tmp/hello

      - name: Create pkg
        run: |
          pkgbuild \
            --root "${{ runner.temp }}/fpc-install" \
            --identifier org.freepascal.fpc.trunk.${{ matrix.cpu }} \
            --version ${{ needs.check.outputs.fpc_version }} \
            --install-location / \
            fpc-${{ needs.check.outputs.fpc_revision }}-${{ matrix.cpu }}-macosx.pkg

      - name: Create DMG
        run: |
          pkg="fpc-${{ needs.check.outputs.fpc_revision }}-${{ matrix.cpu }}-macosx.pkg"
          vol="fpc-${{ needs.check.outputs.fpc_revision }}-${{ matrix.cpu }}-macosx"
          dmg_rw="${vol}-rw.dmg"
          dmg_out="${vol}.dmg"
          pkg_size=$(du -sm "${pkg}" | cut -f1)
          dmg_size=$(( pkg_size + 20 ))
          hdiutil create -volname "${vol}" -size "${dmg_size}m" -fs HFS+ -ov "${dmg_rw}"
          hdiutil attach "${dmg_rw}" -mountpoint /Volumes/fpc-pkg
          cp "${pkg}" /Volumes/fpc-pkg/
          hdiutil detach /Volumes/fpc-pkg
          hdiutil convert "${dmg_rw}" -format UDZO -ov -o "${dmg_out}"
          rm "${dmg_rw}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpc-trunk-${{ matrix.cpu }}
          path: fpc-${{ needs.check.outputs.fpc_revision }}-${{ matrix.cpu }}-macosx.dmg

  release:
    name: Publish release
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fpc-trunk-*
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ needs.check.outputs.fpc_revision }}"
          prev_tag=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName \
            --jq '.[0].tagName' 2>/dev/null || true)
          if [[ -n "${prev_tag}" && "${prev_tag}" != "${tag}" ]]; then
            gh release edit "${prev_tag}" --repo ${{ github.repository }} --prerelease --no-latest 2>/dev/null || true
          fi
          full_hash="${{ needs.check.outputs.fpc_commit }}"
          short_hash="${full_hash:0:8}"
          commit_url="https://gitlab.com/freepascal.org/fpc/source/-/commit/${full_hash}"
          printf 'FPC source commit: [%s](%s) %s\n' \
            "${short_hash}" \
            "${commit_url}" \
            "${{ needs.check.outputs.fpc_commit_title }}" > /tmp/release-notes.txt
          gh release delete "${tag}" --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh release create "${tag}" \
            --repo ${{ github.repository }} \
            --title "FPC ${{ needs.check.outputs.fpc_version }} trunk (${{ needs.check.outputs.fpc_revision }})" \
            --notes-file /tmp/release-notes.txt \
            --latest \
            fpc-${{ needs.check.outputs.fpc_revision }}-aarch64-macosx.dmg \
            fpc-${{ needs.check.outputs.fpc_revision }}-x86_64-macosx.dmg

  update-cask:
    name: Update Homebrew cask
    needs: [check, release]
    uses: ./.github/workflows/update-cask.yml
    with:
      tag: v${{ needs.check.outputs.fpc_revision }}
    secrets: inherit

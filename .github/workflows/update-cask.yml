name: Update Homebrew Cask

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v3.3.1-20098-g4fe20ded55), leave empty to use latest'
        required: false
        default: ''
  workflow_call:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        type: string

jobs:
  update-cask:
    name: Update homebrew-fpc cask
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and asset names
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.tag }}"
          if [[ -z "${tag}" ]]; then
            tag=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName \
              --jq '.[0].tagName')
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          arm_dmg=$(gh release view "${tag}" --repo ${{ github.repository }} --json assets \
            --jq '.assets[].name' | grep 'aarch64-macosx')
          intel_dmg=$(gh release view "${tag}" --repo ${{ github.repository }} --json assets \
            --jq '.assets[].name' | grep 'x86_64-macosx')

          echo "arm_dmg=${arm_dmg}" >> "$GITHUB_OUTPUT"
          echo "intel_dmg=${intel_dmg}" >> "$GITHUB_OUTPUT"

          # fpc-3.3.1-20098-g4fe20ded55-aarch64-macosx.dmg -> version=3.3.1, short_hash=g4fe20ded55
          version=$(echo "${arm_dmg}" | sed 's/^fpc-//' | cut -d- -f1)
          short_hash=$(echo "${arm_dmg}" | sed 's/^fpc-//' | cut -d- -f3)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "short_hash=${short_hash}" >> "$GITHUB_OUTPUT"

      - name: Calculate SHA256
        id: sha256
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.resolve.outputs.tag }}"

          arm_sha=$(gh release download "${tag}" --repo ${{ github.repository }} \
            --pattern "${{ steps.resolve.outputs.arm_dmg }}" --output - | shasum -a 256 | awk '{print $1}')
          intel_sha=$(gh release download "${tag}" --repo ${{ github.repository }} \
            --pattern "${{ steps.resolve.outputs.intel_dmg }}" --output - | shasum -a 256 | awk '{print $1}')

          echo "arm=${arm_sha}" >> "$GITHUB_OUTPUT"
          echo "intel=${intel_sha}" >> "$GITHUB_OUTPUT"

      - name: Update cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_FPC_TOKEN }}
        run: |
          version="${{ steps.resolve.outputs.version }}"
          short_hash="${{ steps.resolve.outputs.short_hash }}"
          cask_file="Casks/fpc@dev.rb"

          git clone https://x-access-token:${GH_TOKEN}@github.com/viking1304/homebrew-fpc.git homebrew-fpc
          cd homebrew-fpc

          sed -i "s/version \".*\"/version \"${version},${short_hash}\"/" "${cask_file}"
          sed -i "s/sha256 arm:   \"[a-f0-9]*\"/sha256 arm:   \"${{ steps.sha256.outputs.arm }}\"/" "${cask_file}"
          sed -i "s/       intel: \"[a-f0-9]*\"/       intel: \"${{ steps.sha256.outputs.intel }}\"/" "${cask_file}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${cask_file}"
          git commit -m "feat: Update fpc@dev to ${version},${short_hash}"
          git push
